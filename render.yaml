# Blueprint Render (plan gratuito): servicio web + PostgreSQL.
# Debe estar en la RAÍZ del repositorio Git que conectes a Render.
#
# IMPORTANTE — estructura del repo en GitHub:
# - Si en la raíz del repo tienes app.py y requirements.txt (repo = carpeta fisio_web),
#   NO pongas rootDir (deja comentada la línea de abajo).
# - Si en GitHub la raíz tiene una carpeta fisio_web/ con app.py dentro, DESCOMENTA rootDir.
#
# https://render.com/docs/blueprint-spec
# https://render.com/docs/deploy-flask

version: "1"

databases:
  - name: fisio-db
    plan: free
    databaseName: fisio

services:
  - type: web
    name: fisio-web
    # Descomenta solo si app.py NO está en la raíz del repo sino en fisio_web/:
    # rootDir: fisio_web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Comillas simples: en YAML, && sin comillas rompe el parseo (& es ancla).
    preDeployCommand: 'flask db upgrade && flask seed'
    # Comillas simples: $PORT se expande al ejecutar el comando en el shell de Render.
    startCommand: 'gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 180 --graceful-timeout 30 --access-logfile - --error-logfile - --forwarded-allow-ips=*'
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: FLASK_APP
        value: app.py
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fisio-db
          property: connectionString
