# Blueprint Render (plan gratuito): servicio web + PostgreSQL.
# Debe estar en la RAÍZ del repositorio Git que conectes a Render.
#
# Monorepo (repo raíz = carpeta padre de fisio_web): mueve este archivo a esa raíz y añade
#   rootDir: fisio_web
# como propiedad del servicio web (mismo nivel que "type: web").
#
# https://render.com/docs/deploy-flask

version: "1"

databases:
  - name: fisio-db
    plan: free
    databaseName: fisio

services:
  - type: web
    name: fisio-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Sin bash scripts (evita CRLF / shebang roto en Windows). FLASK_APP viene de envVars.
    preDeployCommand: "flask db upgrade && flask seed"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 180 --graceful-timeout 30 --access-logfile - --error-logfile - --forwarded-allow-ips='*'"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: FLASK_APP
        value: app.py
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fisio-db
          property: connectionString
