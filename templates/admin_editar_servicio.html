{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <h2 class="mb-4">Editar Servicio</h2>

                    <form method="POST">
                        {% include '_csrf.html' %}
                        <div class="mb-3">
                            <label class="form-label">Nombre del Servicio</label>
                            <input type="text" name="nombre" class="form-control" value="{{ servicio.nombre }}"
                                required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Precio ($)</label>
                                <input type="number" step="0.01" name="precio" class="form-control"
                                    value="{{ servicio.precio }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Duración (minutos)</label>
                                <input type="number" name="duracion" class="form-control"
                                    value="{{ servicio.duracion_minutos }}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <input type="text" name="categoria" class="form-control"
                                value="{{ servicio.categoria or '' }}">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Descripción</label>
                            <textarea name="descripcion" class="form-control"
                                rows="4">{{ servicio.descripcion }}</textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">URL de imagen (opcional)</label>
                            <input type="text" name="imagen" class="form-control" value="{{ servicio.imagen or '' }}" placeholder="https://...">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('admin') }}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
