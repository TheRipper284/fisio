{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Calendario de Citas</h2>
        <a href="{{ url_for('admin_inicio') }}" class="btn btn-outline-primary"><i class="bi bi-arrow-left me-1"></i> Panel de Admin</a>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body">
            <div id="calendar"></div>
        </div>
    </div>
</div>

<!-- FullCalendar -->
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/es.js'></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            locale: 'es',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            slotMinTime: '09:00:00',
            slotMaxTime: '19:00:00',
            events: '/api/citas_calendario',
            eventClick: function (info) {
                window.location.href = '/admin?q=' + info.event.id; // Podríamos mejorar esto para que vaya directo a una vista de detalle
            }
        });
        calendar.render();
    });
</script>

<style>
    .fc-event {
        cursor: pointer;
    }

    #calendar {
        min-height: 600px;
    }
</style>
{% endblock %}
