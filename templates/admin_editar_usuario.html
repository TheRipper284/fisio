{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 rounded-4">
                <div class="card-header bg-dark text-white py-3 d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">Editar Usuario</h4>
                    <span class="badge bg-secondary">{{ usuario.rol|capitalize }}</span>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label" for="nombre">Nombre Completo</label>
                                <input class="form-control" id="nombre" name="nombre" type="text"
                                    value="{{ usuario.nombre }}" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="rol">Rol del Usuario</label>
                                <select class="form-select" id="rol" name="rol" required>
                                    <option value="cliente" {% if usuario.rol == 'cliente' %}selected{% endif %}>Cliente
                                    </option>
                                    <option value="empleado" {% if usuario.rol == 'empleado' %}selected{% endif %}>
                                        Empleado (Fisio)</option>
                                    <option value="recepcionista" {% if usuario.rol == 'recepcionista' %}selected{% endif %}>
                                        Recepcionista</option>
                                    <option value="admin" {% if usuario.rol == 'admin' %}selected{% endif %}>
                                        Administrador</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="email">Correo Electrónico</label>
                            <input class="form-control" id="email" name="email" type="email" value="{{ usuario.email }}"
                                required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="telefono">Teléfono</label>
                            <input class="form-control" id="telefono" name="telefono" type="text"
                                value="{{ usuario.telefono or '' }}" />
                        </div>
                        <div class="mb-4">
                            <label class="form-label" for="password">Nueva Contraseña (dejar en blanco para no
                                cambiar)</label>
                            <input class="form-control" id="password" name="password" type="password"
                                placeholder="Opcional" />
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary py-2" type="submit">Guardar Cambios</button>
                            <a href="{{ url_for('gestion_usuarios') }}" class="btn btn-link text-muted">Volver a la
                                lista</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
