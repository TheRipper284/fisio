{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">Registro de Paciente</h2>
                    <p class="text-center text-muted mb-4">Crea una cuenta para gestionar tus citas cómodamente.</p>

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Nombre Completo</label>
                            <input type="text" name="nombre" class="form-control px-3" placeholder="Ej. Juan Pérez"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Correo Electrónico</label>
                            <input type="email" name="email" class="form-control px-3" placeholder="correo@ejemplo.com"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Teléfono de Contacto</label>
                            <input type="tel" name="telefono" class="form-control px-3" placeholder="600 000 000"
                                required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Contraseña</label>
                            <input type="password" name="password" class="form-control px-3" required>
                            <div class="form-text">Mínimo 6 caracteres.</div>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill py-3">Crear mi
                                cuenta</button>
                        </div>

                        <div class="text-center">
                            <p class="text-muted small">¿Ya tienes una cuenta? <a href="{{ url_for('login') }}">Inicia
                                    sesión aquí</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
